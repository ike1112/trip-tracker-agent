<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="1660" viewBox="0 0 1320 1660" role="img" aria-labelledby="title desc">
  <title id="title">Poller and notifier flowchart</title>
  <desc id="desc">Visual flowchart for EventBridge, poller, MCP search, snapshot writing, alert decision, and notifier handling.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#44546a"/>
    </marker>
    <style>
      .bg { fill: #f7f9fc; }
      .lane { fill: #ffffff; stroke: #d9e2ef; stroke-width: 2; }
      .lane-title { font: 700 18px Arial, sans-serif; fill: #22324a; }
      .box { fill: #eaf3ff; stroke: #4178be; stroke-width: 2; rx: 10; }
      .box2 { fill: #eef8ef; stroke: #2f7d32; stroke-width: 2; rx: 10; }
      .warn { fill: #fff4df; stroke: #b7791f; stroke-width: 2; rx: 10; }
      .stop { fill: #fdecec; stroke: #c62828; stroke-width: 2; rx: 10; }
      .decision { fill: #fffbe6; stroke: #9a6b00; stroke-width: 2; }
      .text { font: 15px Arial, sans-serif; fill: #1f2937; }
      .small { font: 13px Arial, sans-serif; fill: #374151; }
      .tiny { font: 12px Arial, sans-serif; fill: #4b5563; }
      .label { font: 700 13px Arial, sans-serif; fill: #22324a; }
      .line { stroke: #44546a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .line-noarrow { stroke: #44546a; stroke-width: 2.2; fill: none; }
      .dash { stroke: #6b7280; stroke-width: 2; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1320" height="1660"/>
  <text x="660" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#172033">Poller And Notifier Logic</text>
  <text x="660" y="70" text-anchor="middle" class="small">Scheduled path, decision gates, and alert delivery outcomes</text>

  <rect class="lane" x="40" y="105" width="250" height="1475" rx="14"/>
  <text class="lane-title" x="165" y="135" text-anchor="middle">Schedule</text>

  <rect class="lane" x="320" y="105" width="360" height="1475" rx="14"/>
  <text class="lane-title" x="500" y="135" text-anchor="middle">Poller Lambda</text>

  <rect class="lane" x="710" y="105" width="260" height="1475" rx="14"/>
  <text class="lane-title" x="840" y="135" text-anchor="middle">Decision Layer</text>

  <rect class="lane" x="1000" y="105" width="280" height="1475" rx="14"/>
  <text class="lane-title" x="1140" y="135" text-anchor="middle">Notifier Lambda</text>

  <!-- Schedule lane -->
  <rect class="box" x="70" y="170" width="190" height="70"/>
  <text class="text" x="165" y="198" text-anchor="middle">EventBridge</text>
  <text class="small" x="165" y="220" text-anchor="middle">rate 240 minutes</text>

  <!-- Poller start -->
  <rect class="box" x="385" y="170" width="230" height="70"/>
  <text class="text" x="500" y="198" text-anchor="middle">Invoke poller</text>
  <text class="small" x="500" y="220" text-anchor="middle">trip-tracker-poller</text>
  <path class="line" d="M260 205 H385"/>

  <rect class="box" x="385" y="285" width="230" height="75"/>
  <text class="text" x="500" y="312" text-anchor="middle">Query active watches</text>
  <text class="small" x="500" y="334" text-anchor="middle">DynamoDB status-index</text>
  <path class="line" d="M500 240 V285"/>

  <polygon class="decision" points="500,410 610,470 500,530 390,470"/>
  <text class="text" x="500" y="466" text-anchor="middle">Active</text>
  <text class="text" x="500" y="488" text-anchor="middle">watch?</text>
  <path class="line" d="M500 360 V410"/>

  <rect class="warn" x="80" y="440" width="170" height="70"/>
  <text class="text" x="165" y="468" text-anchor="middle">poll_complete</text>
  <text class="small" x="165" y="490" text-anchor="middle">watches_polled=0</text>
  <path class="line" d="M390 470 H250"/>
  <text class="label" x="315" y="458" text-anchor="middle">No</text>

  <rect class="box" x="385" y="575" width="230" height="80"/>
  <text class="text" x="500" y="604" text-anchor="middle">Build search inputs</text>
  <text class="small" x="500" y="626" text-anchor="middle">dateWindow, pax, prefs</text>
  <path class="line" d="M500 530 V575"/>
  <text class="label" x="522" y="555">Yes</text>

  <rect class="box" x="385" y="700" width="230" height="80"/>
  <text class="text" x="500" y="728" text-anchor="middle">Call MCP servers</text>
  <text class="small" x="500" y="750" text-anchor="middle">flights + hotels</text>
  <path class="line" d="M500 655 V700"/>

  <polygon class="decision" points="500,825 610,885 500,945 390,885"/>
  <text class="text" x="500" y="875" text-anchor="middle">Offers</text>
  <text class="text" x="500" y="897" text-anchor="middle">found?</text>
  <path class="line" d="M500 780 V825"/>

  <rect class="warn" x="95" y="850" width="170" height="80"/>
  <text class="text" x="180" y="878" text-anchor="middle">snapshot_skipped</text>
  <text class="small" x="180" y="900" text-anchor="middle">no_qualifying_offers</text>
  <path class="line" d="M390 885 H265"/>
  <text class="label" x="325" y="873" text-anchor="middle">No</text>

  <rect class="box" x="385" y="990" width="230" height="80"/>
  <text class="text" x="500" y="1018" text-anchor="middle">Write FareHistory</text>
  <text class="small" x="500" y="1040" text-anchor="middle">snapshot_written</text>
  <path class="line" d="M500 945 V990"/>
  <text class="label" x="522" y="970">Yes</text>

  <polygon class="decision" points="500,1110 610,1170 500,1230 390,1170"/>
  <text class="text" x="500" y="1155" text-anchor="middle">Dedup</text>
  <text class="text" x="500" y="1177" text-anchor="middle">eligible?</text>
  <text class="tiny" x="500" y="1198" text-anchor="middle">&lt; 95% last alert</text>
  <path class="line" d="M500 1070 V1110"/>

  <rect class="warn" x="95" y="1135" width="170" height="80"/>
  <text class="text" x="180" y="1163" text-anchor="middle">decision_made</text>
  <text class="small" x="180" y="1185" text-anchor="middle">dedup_blocked</text>
  <path class="line" d="M390 1170 H265"/>
  <text class="label" x="326" y="1158" text-anchor="middle">No</text>

  <!-- Decision layer -->
  <polygon class="decision" points="840,1110 950,1170 840,1230 730,1170"/>
  <text class="text" x="840" y="1152" text-anchor="middle">Threshold or</text>
  <text class="text" x="840" y="1174" text-anchor="middle">anomaly?</text>
  <text class="tiny" x="840" y="1196" text-anchor="middle">price &lt; budget or low</text>
  <path class="line" d="M610 1170 H730"/>
  <text class="label" x="665" y="1158" text-anchor="middle">Yes</text>

  <rect class="warn" x="755" y="1290" width="170" height="80"/>
  <text class="text" x="840" y="1318" text-anchor="middle">decision_made</text>
  <text class="small" x="840" y="1340" text-anchor="middle">no_gate_passed</text>
  <path class="line" d="M840 1230 V1290"/>
  <text class="label" x="862" y="1262">No</text>

  <rect class="box2" x="755" y="985" width="170" height="75"/>
  <text class="text" x="840" y="1013" text-anchor="middle">Decision model</text>
  <text class="small" x="840" y="1035" text-anchor="middle">stub or Bedrock</text>
  <path class="line" d="M840 1110 V1060"/>
  <text class="label" x="862" y="1086">Yes</text>

  <polygon class="decision" points="840,835 950,895 840,955 730,895"/>
  <text class="text" x="840" y="890" text-anchor="middle">alert=true?</text>
  <path class="line" d="M840 985 V955"/>

  <rect class="warn" x="755" y="705" width="170" height="80"/>
  <text class="text" x="840" y="733" text-anchor="middle">decision_made</text>
  <text class="small" x="840" y="755" text-anchor="middle">alert=false</text>
  <path class="line" d="M840 835 V785"/>
  <text class="label" x="862" y="816">No</text>

  <!-- Notifier lane -->
  <rect class="box2" x="1050" y="855" width="180" height="80"/>
  <text class="text" x="1140" y="884" text-anchor="middle">Async invoke</text>
  <text class="small" x="1140" y="906" text-anchor="middle">trip-tracker-notifier</text>
  <path class="line" d="M950 895 H1050"/>
  <text class="label" x="990" y="883" text-anchor="middle">Yes</text>

  <rect class="box2" x="1050" y="980" width="180" height="75"/>
  <text class="text" x="1140" y="1008" text-anchor="middle">Render alert email</text>
  <text class="small" x="1140" y="1030" text-anchor="middle">subject + body</text>
  <path class="line" d="M1140 935 V980"/>

  <rect class="box2" x="1050" y="1110" width="180" height="80"/>
  <text class="text" x="1140" y="1138" text-anchor="middle">SES send</text>
  <text class="small" x="1140" y="1160" text-anchor="middle">real email attempt</text>
  <path class="line" d="M1140 1055 V1110"/>

  <rect class="stop" x="1015" y="1240" width="145" height="75"/>
  <text class="text" x="1088" y="1268" text-anchor="middle">ses_send_failed</text>
  <text class="small" x="1088" y="1290" text-anchor="middle">no writeback</text>
  <path class="line" d="M1105 1190 C1088 1210 1088 1225 1088 1240"/>
  <text class="label" x="1062" y="1212" text-anchor="middle">Fail</text>

  <rect class="box2" x="1050" y="1370" width="180" height="80"/>
  <text class="text" x="1140" y="1398" text-anchor="middle">Update watch</text>
  <text class="small" x="1140" y="1420" text-anchor="middle">lastAlertedAt/Price</text>
  <path class="line" d="M1140 1190 C1240 1190 1240 1370 1140 1370"/>
  <text class="label" x="1242" y="1260">Success</text>

  <rect class="box2" x="1050" y="1470" width="180" height="70"/>
  <text class="text" x="1140" y="1498" text-anchor="middle">Notifier success</text>
  <text class="small" x="1140" y="1520" text-anchor="middle">or conflict logged</text>
  <path class="line" d="M1140 1450 V1470"/>

  <!-- Common completion -->
  <rect class="box" x="385" y="1400" width="230" height="70"/>
  <text class="text" x="500" y="1428" text-anchor="middle">poll_complete</text>
  <text class="small" x="500" y="1450" text-anchor="middle">watches_errored count</text>

  <path class="dash" d="M180 930 C180 1485 385 1435 385 1435"/>
  <path class="dash" d="M180 1215 C180 1515 385 1435 385 1435"/>
  <path class="dash" d="M840 1370 C840 1505 615 1435 615 1435"/>
  <path class="dash" d="M840 785 C840 1510 615 1435 615 1435"/>
  <path class="dash" d="M1140 1540 C1140 1605 615 1435 615 1435"/>

  <!-- Legend -->
  <rect x="70" y="1598" width="1180" height="42" rx="10" fill="#ffffff" stroke="#d9e2ef"/>
  <rect class="box" x="95" y="1608" width="18" height="18"/>
  <text class="tiny" x="120" y="1622">processing</text>
  <rect class="box2" x="210" y="1608" width="18" height="18"/>
  <text class="tiny" x="235" y="1622">success/action</text>
  <rect class="warn" x="345" y="1608" width="18" height="18"/>
  <text class="tiny" x="370" y="1622">soft stop/no alert</text>
  <polygon class="decision" points="510,1608 528,1617 510,1626 492,1617"/>
  <text class="tiny" x="537" y="1622">decision gate</text>
  <line class="line-noarrow" x1="675" y1="1617" x2="720" y2="1617"/>
  <text class="tiny" x="730" y="1622">normal flow</text>
  <line class="dash" x1="850" y1="1617" x2="900" y2="1617"/>
  <text class="tiny" x="910" y="1622">return to poll_complete</text>
</svg>
